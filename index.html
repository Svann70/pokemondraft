<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Delicious League Draft Board — A food-themed Pokémon Draft League roster picker with point-based budgeting, drag-drop, and claiming system.">
  <title>Delicious League Draft Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Top Navigation Bar -->
  <nav class="navbar">
    <div class="navbar__brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
        <path d="M7 2v20"/>
        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
      </svg>
      Delicious League
    </div>
    <div class="navbar__tabs" id="navTabs">
      <button class="nav-tab active" data-tab="board">Draft Board</button>
      <button class="nav-tab" data-tab="admin">Admin Dashboard</button>
    </div>
    <!-- Spacer for flex-between alignment to center tabs -> roughly same width as brand -->
    <div style="width: 140px;" class="hide-mobile"></div>
  </nav>

  <div class="app-wrapper">
    <!-- Main content area (Left Side) -->
    <div class="app-container">

      <header class="header" id="mainHeader">
        <span class="header__badge">Season 1</span>
        <h1 class="header__title">Delicious League Draft Board</h1>
        <p class="header__subtitle">Food-themed Pokemon · Point-based Draft System · Drag &amp; Drop</p>
      </header>

      <!-- Stats Bar (Hidden on Admin) -->
      <div class="stats-bar" id="statsBar"></div>

      <!-- Search & Filters (Hidden on Admin) -->
      <div class="controls-wrapper" id="controls">
        <div class="search-box">
          <span class="search-box__icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" class="search-box__input" id="searchInput" placeholder="Search Pokemon..." autocomplete="off">
        </div>
        <div class="filter-scroll" id="filterGroup"></div>
      </div>

      <!-- Views -->
      <main id="mainContent"></main>
      <main id="adminContent" style="display:none"></main>

      <footer class="footer">
        Sprites from Pokémon Showdown · Delicious League Draft Board
      </footer>
    </div>

    <!-- Item Market sidebar (Right Side, Hidden on Admin mode) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__title">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
          <path d="m3.3 7 8.7 5 8.7-5"/>
          <path d="M12 22V12"/>
        </svg>
        Item Market
      </div>
      <div id="itemList"></div>
      <p class="sidebar__hint">Items for competitive battles</p>
    </aside>
  </div>

  <!-- Pokédex tooltip (absolute positioned) -->
  <div class="pokedex-tooltip" id="pokedexTooltip">
    <div class="pokedex-tooltip__title"></div>
    <div class="pokedex-tooltip__body"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
